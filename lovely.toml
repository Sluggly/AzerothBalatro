[manifest]
version = "0.0.1"
dump_lua = true
priority = 0

# 1. Load Config logic
[[patches]]
[patches.module]
source = "main.lua"
before = "main.lua"
name = "warcraft_mod"

# 2. Logic to remove Vanilla Jokers
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "if v.yes_pool_flag and not G.GAME.pool_flags[v.yes_pool_flag] then add = nil end"
position = "after"
payload = '''
if v.set == 'Joker' and not v.is_warcraft and warcraft_config and warcraft_config.remove_vanilla_jokers then 
    add = nil 
end
'''
match_indent = true